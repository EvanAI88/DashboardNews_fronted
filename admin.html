<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsPulse — Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #ffffff;
      --bg2: #f9fafb;
      --text: #111827;
      --text-sec: #6b7280;
      --border: rgba(0,0,0,0.08);
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --bg2: #1e293b;
        --text: #f1f5f9;
        --text-sec: #cbd5e1;
        --border: rgba(255,255,255,0.1);
      }
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg2);
      color: var(--text);
    }
    
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 22px;
      font-weight: 700;
    }
    
    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .user-name {
      font-size: 14px;
      font-weight: 500;
    }
    
    button {
      font-family: inherit;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      padding: 8px 14px;
      transition: all 0.15s;
    }
    
    .btn-logout {
      background: var(--danger);
      color: white;
    }
    
    .btn-logout:hover {
      opacity: 0.9;
    }
    
    .btn-back {
      background: var(--primary);
      color: white;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    
    .stat-label {
      font-size: 13px;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
    }
    
    .table-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }
    
    .table-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    th {
      background: var(--bg2);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    
    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    
    tr:hover {
      background: var(--bg2);
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .status-trial {
      background: #fef3c7;
      color: #92400e;
    }
    
    .status-premium {
      background: #dcfce7;
      color: #166534;
    }
    
    .status-admin {
      background: #dbeafe;
      color: #0c4a6e;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-sec);
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🎛️ NewsPulse Admin</div>
  <div class="header-right">
    <span class="user-name" id="userName">Admin</span>
    <button class="btn-back" onclick="goNews()">← Back to News</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <div class="title">Dashboard</div>
  
  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="totalUsers">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Premium Users</div>
      <div class="stat-value" id="premiumUsers">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Trial Users</div>
      <div class="stat-value" id="trialUsers">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-value" id="totalRevenue">$-</div>
    </div>
  </div>
  
  <!-- USERS TABLE -->
  <div class="table-section">
    <div class="table-title">Users Management</div>
    <div id="usersLoading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p style="margin-top:12px;">Loading users...</p>
    </div>
    <table id="usersTable" style="display:none;">
      <thead>
        <tr>
          <th>Email</th>
          <th>Name</th>
          <th>Status</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="usersList"></tbody>
    </table>
  </div>
</div>

<script>
const API_URL = 'https://dashboardnews-backend.onrender.com';

async function checkAdmin() {
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  
  if (!token || !user.is_admin) {
    window.location.href = 'login.html';
    return;
  }
  
  document.getElementById('userName').textContent = user.name;
}

async function loadStats() {
  try {
    const token = localStorage.getItem('token');
    const res = await fetch(`${API_URL}/api/admin/stats`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    
    const stats = data.stats;
    document.getElementById('totalUsers').textContent = stats.totalUsers;
    document.getElementById('premiumUsers').textContent = stats.premiumUsers;
    document.getElementById('trialUsers').textContent = stats.trialUsers;
    document.getElementById('totalRevenue').textContent = '$' + stats.revenue.toFixed(2);
  } catch (error) {
    console.error('Error loading stats:', error);
  }
}

async function loadUsers() {
  try {
    document.getElementById('usersLoading').style.display = 'block';
    document.getElementById('usersTable').style.display = 'none';
    
    const token = localStorage.getItem('token');
    const res = await fetch(`${API_URL}/api/admin/users`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    
    const users = data.users || [];
    const tbody = document.getElementById('usersList');
    tbody.innerHTML = '';
    
    users.forEach(user => {
      const date = new Date(user.created_at).toLocaleDateString('id-ID');
      const statusBadge = getStatusBadge(user.subscription_status);
      
      tbody.innerHTML += `
        <tr>
          <td>${user.email}</td>
          <td>${user.name}</td>
          <td>${statusBadge}</td>
          <td>${date}</td>
        </tr>
      `;
    });
    
    document.getElementById('usersLoading').style.display = 'none';
    document.getElementById('usersTable').style.display = 'table';
  } catch (error) {
    console.error('Error loading users:', error);
    document.getElementById('usersLoading').innerHTML = '<p>❌ Failed to load users</p>';
  }
}

function getStatusBadge(status) {
  const badges = {
    'admin': '<span class="status-badge status-admin">👨‍💼 Admin</span>',
    'premium': '<span class="status-badge status-premium">⭐ Premium</span>',
    'free_trial': '<span class="status-badge status-trial">📅 Free Trial</span>',
    'expired': '<span class="status-badge">❌ Expired</span>',
  };
  return badges[status] || `<span>${status}</span>`;
}

function goNews() {
  window.location.href = 'index.html';
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  window.location.href = 'login.html';
}

// Init
checkAdmin();
loadStats();
loadUsers();
</script>

</body>
</html>
