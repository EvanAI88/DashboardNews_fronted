<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsPulse — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #ffffff;
      --bg2: #f9fafb;
      --text: #111827;
      --text-sec: #6b7280;
      --text-ter: #9ca3af;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.12);
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --bg2: #1e293b;
        --text: #f1f5f9;
        --text-sec: #cbd5e1;
        --text-ter: #94a3b8;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.15);
      }
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }
    
    .container { max-width: 900px; margin: 0 auto; }
    
    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .title { font-size: 24px; font-weight: 600; color: var(--text); }
    
    .subtitle {
      font-size: 13px;
      color: var(--text-sec);
      margin-top: 4px;
    }
    
    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    
    /* ── USER BAR ── */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg);
      border: 0.5px solid var(--border2);
      border-radius: 8px;
    }
    
    .user-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    
    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    
    .trial-status {
      font-size: 11px;
      color: var(--text-ter);
      margin-top: 2px;
    }
    
    .trial-status.active {
      color: #10b981;
      font-weight: 500;
    }
    
    .trial-status.expired {
      color: #ef4444;
      font-weight: 500;
    }
    
    .btn-logout {
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .btn-logout:hover {
      background: var(--bg2);
      color: #ef4444;
      border-color: #ef4444;
    }
    
    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    
    .tab {
      padding: 6px 14px;
      font-size: 13px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      background: var(--bg);
      color: var(--text-sec);
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .tab:hover { background: var(--bg2); color: var(--text); }
    .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    
    /* ── SEARCH ── */
    .search-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .search {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    
    .search:focus { border-color: var(--border); }
    
    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      font-size: 13px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    
    .btn-refresh:hover { background: var(--bg2); }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-refresh.loading span { animation: spin 0.8s linear infinite; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ── STATS ── */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--text-sec);
    }
    
    .stats b { color: var(--text); font-weight: 500; }
    
    /* ── NEWS LIST ── */
    .list { display: flex; flex-direction: column; gap: 2px; }
    
    .news-item {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      transition: border-color 0.12s, background 0.12s;
    }
    
    .news-item:hover {
      border-color: var(--border2);
      background: var(--bg2);
    }
    
    .news-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 8px;
      letter-spacing: 0.01em;
    }
    
    .badge-finance { background: #DBEAFE; color: #1e40af; }
    .badge-crypto { background: #FFECD2; color: #92400e; }
    .badge-ai { background: #F3E8FF; color: #581c87; }
    .badge-tech { background: #DCFCE7; color: #15803d; }
    
    .source-label { font-size: 11px; color: var(--text-ter); }
    .time-label { font-size: 11px; color: var(--text-ter); margin-left: auto; }
    
    .news-headline {
      font-size: 13px;
      color: var(--text);
      line-height: 1.45;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .divider { height: 0.5px; background: var(--border); margin: 8px 0; }
    
    .trans-body {
      font-size: 12px;
      color: var(--text-sec);
      line-height: 1.6;
    }
    
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-sec);
      font-size: 14px;
    }
    
    .error {
      background: #fee2e2;
      border: 0.5px solid #fecaca;
      color: #991b1b;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- HEADER + USER BAR -->
  <div class="header">
    <div>
      <div class="title">NewsPulse</div>
      <div class="subtitle">
        <span class="live-dot"></span>
        Finance · Crypto · AI · Tech
      </div>
    </div>
  </div>

  <!-- USER INFO BAR -->
  <div class="user-bar" id="userBar" style="display:none">
    <div class="user-info">
      <div class="user-name" id="userName">Loading...</div>
      <div class="trial-status" id="trialStatus">Free Trial</div>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>

  <!-- CATEGORY TABS -->
  <div class="tabs">
    <button class="tab active" onclick="filterCategory('all')">🗞 Semua</button>
    <button class="tab" onclick="filterCategory('finance')">💰 Finance</button>
    <button class="tab" onclick="filterCategory('crypto')">₿ Crypto</button>
    <button class="tab" onclick="filterCategory('ai')">🤖 AI</button>
    <button class="tab" onclick="filterCategory('tech')">⚙️ Tech & Chip</button>
  </div>
  
  <!-- SEARCH + REFRESH -->
  <div class="search-wrap">
    <input class="search" type="text" id="searchInput" placeholder="Cari berita..." oninput="filterNews()">
    <button class="btn-refresh" id="refreshBtn" onclick="fetchNews()">
      <span>🔄</span> Refresh
    </button>
  </div>
  
  <!-- ERROR MESSAGE -->
  <div id="errorMsg" class="error" style="display:none;"></div>
  
  <!-- STATS -->
  <div class="stats" id="statsBar" style="display:none;">
    Total: <b id="totalCount">0</b> &nbsp;|&nbsp;
    Ditampilkan: <b id="shownCount">0</b>
  </div>
  
  <!-- NEWS LIST -->
  <div class="list" id="newsList">
    <div class="empty">🔄 Loading berita...</div>
  </div>
  
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const API_URL = 'https://dashboardnews-backend.onrender.com'; // Ganti ke Render URL untuk production

// ── STATE ───────────────────────────────────────────────────────────────
let allNews = [];
let activeCategory = 'all';

// ── CHECK AUTH: Redirect ke login jika belum login ──────────────────────
function checkAuth() {
  const token = localStorage.getItem('token');
  const user = localStorage.getItem('user');
  
  if (!token || !user) {
    window.location.href = 'login.html';
    return false;
  }
  
  return { token, user: JSON.parse(user) };
}

// ── SETUP: Display user info ────────────────────────────────────────────
function setupUserBar(user) {
  document.getElementById('userName').textContent = user.name;
  
  const trialStatus = document.getElementById('trialStatus');
  if (user.trial_days_remaining > 0) {
    trialStatus.textContent = `Free Trial — ${user.trial_days_remaining} hari tersisa`;
    trialStatus.classList.add('active');
  } else {
    trialStatus.textContent = 'Trial Expired — Upgrade ke paid plan';
    trialStatus.classList.add('expired');
  }
  
  document.getElementById('userBar').style.display = 'flex';
}

// ── LOGOUT ──────────────────────────────────────────────────────────────
function logout() {
  if (confirm('Yakin mau logout?')) {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }
}

// ── FETCH NEWS (Protected - butuh token) ────────────────────────────────
async function fetchNews() {
  const auth = checkAuth();
  if (!auth) return;
  
  const btn = document.getElementById('refreshBtn');
  const errorMsg = document.getElementById('errorMsg');
  
  btn.disabled = true;
  btn.classList.add('loading');
  errorMsg.style.display = 'none';
  
  document.getElementById('newsList').innerHTML = '<div class="empty">Loading...</div>';
  document.getElementById('statsBar').style.display = 'none';
  
  try {
    const res = await fetch(`${API_URL}/api/news`, {
      headers: {
        'Authorization': 'Bearer ' + auth.token
      }
    });
    
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Unknown error');
    
    allNews = data.news || [];
    document.getElementById('totalCount').textContent = allNews.length;
    document.getElementById('statsBar').style.display = 'flex';
    
    filterNews();
  } catch (error) {
    errorMsg.textContent = '⚠️ Error: ' + error.message;
    errorMsg.style.display = 'block';
    document.getElementById('newsList').innerHTML = '<div class="empty">❌ Gagal memuat berita</div>';
  }
  
  btn.disabled = false;
  btn.classList.remove('loading');
}

// ── FILTER BY CATEGORY ──────────────────────────────────────────────────
function filterCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  filterNews();
}

// ── FILTER & RENDER ────────────────────────────────────────────────────
function filterNews() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  
  let filtered = allNews;
  if (activeCategory !== 'all') {
    filtered = filtered.filter(n => n.category === activeCategory);
  }
  if (query) {
    filtered = filtered.filter(n =>
      n.title.toLowerCase().includes(query) ||
      n.description.toLowerCase().includes(query) ||
      n.source.toLowerCase().includes(query)
    );
  }
  
  document.getElementById('shownCount').textContent = filtered.length;
  
  const el = document.getElementById('newsList');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty">Tidak ada berita ditemukan</div>';
    return;
  }
  
  const BADGE_MAP = {
    finance: 'badge-finance',
    crypto: 'badge-crypto',
    ai: 'badge-ai',
    tech: 'badge-tech'
  };
  
  el.innerHTML = filtered.map(n => `
    <div class="news-item">
      <div class="news-meta">
        <span class="badge ${BADGE_MAP[n.category]}">${n.category.toUpperCase()}</span>
        <span class="source-label">${n.source}</span>
        <span class="time-label">now</span>
      </div>
      <div class="news-headline">${n.title}</div>
      <div class="divider"></div>
      <div class="trans-body">${n.description}</div>
    </div>
  `).join('');
}

// ── INIT: Load on page start ────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const auth = checkAuth();
  if (auth) {
    setupUserBar(auth.user);
    fetchNews();
    
    // Auto-refresh setiap 5 menit
    setInterval(fetchNews, 5 * 60 * 1000);
  }
});
</script>

</body>
</html>
