<!-- ADD THIS TO YOUR index.html (after header, before container) -->

<!-- PAYMENT MODAL -->
<div id="paymentModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:12px; padding:30px; max-width:400px; width:90%;">
    <h2 style="margin-bottom:20px;">Upgrade to Premium</h2>
    
    <div style="margin-bottom:20px;">
      <label style="display:block; margin-bottom:10px; font-weight:600;">Choose Plan:</label>
      
      <div style="margin-bottom:10px;">
        <input type="radio" name="plan" value="monthly" checked onchange="updatePrice()">
        <label style="display:inline; margin-left:8px;">
          📅 Monthly - Rp 49,000 / bulan
        </label>
      </div>
      
      <div>
        <input type="radio" name="plan" value="yearly" onchange="updatePrice()">
        <label style="display:inline; margin-left:8px;">
          🎯 Yearly - Rp 399,000 / tahun (HEMAT!)
        </label>
      </div>
    </div>
    
    <div style="background:#f0f0f0; padding:12px; border-radius:6px; margin-bottom:20px; font-weight:600;">
      Total: Rp <span id="totalPrice">49,000</span>
    </div>
    
    <div style="display:flex; gap:10px;">
      <button onclick="closePaymentModal()" style="flex:1; padding:10px; background:#ccc; border:none; border-radius:6px; cursor:pointer;">
        Cancel
      </button>
      <button onclick="proceedPayment()" style="flex:1; padding:10px; background:#3b82f6; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600;">
        Bayar Sekarang
      </button>
    </div>
  </div>
</div>

<!-- ADD THESE SCRIPTS -->
<script src="https://app.sandbox.midtrans.com/snap/snap.js"></script>
<script>
const API_URL = 'https://dashboardnews-backend.onrender.com';

function showPaymentModal() {
  document.getElementById('paymentModal').style.display = 'flex';
}

function closePaymentModal() {
  document.getElementById('paymentModal').style.display = 'none';
}

function updatePrice() {
  const plan = document.querySelector('input[name="plan"]:checked').value;
  const price = plan === 'monthly' ? 49000 : 399000;
  document.getElementById('totalPrice').textContent = price.toLocaleString('id-ID');
}

async function proceedPayment() {
  const token = localStorage.getItem('token');
  const plan = document.querySelector('input[name="plan"]:checked').value;
  
  try {
    // Get snap token from backend
    const res = await fetch(`${API_URL}/api/payment/subscribe`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ plan }),
    });
    
    const data = await res.json();
    if (!data.ok) {
      alert('Error: ' + data.error);
      return;
    }
    
    // Open Midtrans payment
    snap.pay(data.snapToken, {
      onSuccess: function(result) {
        alert('✅ Payment Success!');
        closePaymentModal();
        location.reload();
      },
      onPending: function(result) {
        alert('⏳ Payment pending...');
      },
      onError: function(result) {
        alert('❌ Payment failed');
      },
      onClose: function() {
        alert('Payment modal closed');
      },
    });
  } catch (error) {
    alert('Error: ' + error.message);
  }
}
</script>
