    .plan-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 24px; font-size: 13px; min-width: 150px; }

    .plan-option { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }

</head>
<body>

<div class="header">
  <div class="logo">🎛️ NewsPulse</div>
  <div class="header-right">
    <div class="user-info">
      <div class="user-name" id="userName">...</div>
      <div id="userStatus"></div>
    </div>
    <button class="btn-upgrade" id="upgradeBtn" onclick="showPaymentModal()" style="display:none;">💳 Upgrade</button>
    <button class="btn-admin" id="adminBtn" style="display:none;" onclick="goAdmin()">👨‍💼 Admin</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="page-title">📰 Financial & Tech News</div>
  <div class="subtitle">Berita real-time dari Finance, Crypto, AI, dan Tech — dalam Bahasa Inggris & Indonesia</div>

  <div class="controls" id="controls" style="display:none;">
    <button class="category-btn active" data-cat="all" onclick="filterCategory('all')">📊 Semua</button>
    <button class="category-btn" data-cat="finance" onclick="filterCategory('finance')">💰 Finance</button>
    <button class="category-btn" data-cat="crypto" onclick="filterCategory('crypto')">₿ Crypto</button>
    <button class="category-btn" data-cat="ai" onclick="filterCategory('ai')">🤖 AI</button>
    <button class="category-btn" data-cat="tech" onclick="filterCategory('tech')">💻 Tech & Chip</button>
    <input type="text" class="search-box" id="searchBox" placeholder="Cari berita..." onkeyup="filterNews()">
    <button class="btn-refresh" onclick="refreshNews()">🔄 Refresh</button>
  </div>

  <div class="stats" id="stats" style="display:none;"></div>
  <div id="contentArea">
    <div class="loading">
      <div class="spinner"></div>
      <p>Memuat berita...</p>
    </div>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal-box">
    <div class="modal-title">💳 Upgrade to Premium</div>
    <div class="plan-option">
      <input type="radio" name="plan" value="monthly" id="planMonthly" checked onchange="updatePrice()">
      <label for="planMonthly">📅 Monthly — <strong>Rp 49.000</strong> / bulan</label>
    </div>
    <div class="plan-option">
      <input type="radio" name="plan" value="yearly" id="planYearly" onchange="updatePrice()">
      <label for="planYearly">🎯 Yearly — <strong>Rp 399.000</strong> / tahun <span style="color:#10b981;">(HEMAT!)</span></label>
    </div>
    <div class="price-box">Total: Rp <span id="totalPrice">49.000</span></div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closePaymentModal()">Batal</button>
      <button class="btn-pay" onclick="proceedPayment()">Bayar Sekarang</button>
    </div>
  </div>
</div>

<script src="https://app.sandbox.midtrans.com/snap/snap.js" 
    data-client-key="Mid-client-hC82SdLOATjPskiW"></script>

<script>
const API_URL = 'https://dashboardnews-backend.onrender.com';
let allNews = [];
let currentCategory = 'all';
let isExpired = false;

async function init() {
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = 'login.html'; return; }

  try {
    const res = await fetch(`${API_URL}/api/auth/me`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();

    if (!data.ok) {
      localStorage.clear();
      window.location.href = 'login.html';
      return;
    }

    const user = data.user;
    localStorage.setItem('user', JSON.stringify(user));
    document.getElementById('userName').textContent = user.name || 'User';

    if (user.isAdmin) {
      isExpired = false;
      document.getElementById('adminBtn').style.display = 'block';
      document.getElementById('userStatus').innerHTML = '<span class="admin-badge">✅ Admin — Full Access</span>';
      showControls();
      await loadNews();

    } else if (user.subscription_status === 'active') {
      isExpired = false;
      document.getElementById('userStatus').innerHTML = '<span class="premium-badge">⭐ Premium Member</span>';
      showControls();
      await loadNews();

    } else if (user.subscription_status === 'trial' && user.trial_days_remaining > 0) {
      isExpired = false;
      document.getElementById('upgradeBtn').style.display = 'block';
      document.getElementById('userStatus').innerHTML =
        `<span class="trial-badge">📅 Free Trial — ${user.trial_days_remaining} hari tersisa</span>`;
      showControls();
      await loadNews();

    } else {
      isExpired = true;
      document.getElementById('upgradeBtn').style.display = 'block';
      document.getElementById('userStatus').innerHTML = '<span class="expired-badge">⛔ Trial Habis</span>';
      showExpiredWall();
    }

  } catch (err) {
    localStorage.clear();
    window.location.href = 'login.html';
  }
}

function showControls() {
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('stats').style.display = 'block';
}

function showExpiredWall() {
  document.getElementById('controls').style.display = 'none';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('contentArea').innerHTML = `
    <div class="expired-wall">
      <div class="lock-icon">🔒</div>
      <h2>Akses Trial Habis</h2>
      <p>Masa trial gratis 5 hari kamu telah berakhir.<br>
      Upgrade sekarang untuk tetap mengakses berita Finance, Crypto, AI, dan Tech secara real-time.</p>
      <button class="btn-upgrade-big" onclick="showPaymentModal()">💳 Upgrade Sekarang</button>
      <div class="plan-info">
        <div class="plan-card"><strong>Rp 49.000</strong>📅 Per Bulan</div>
        <div class="plan-card"><strong>Rp 399.000</strong>🎯 Per Tahun <span style="color:#10b981;font-weight:600;">(HEMAT!)</span></div>
      </div>
    </div>`;
}

function filterCategory(cat) {
  if (isExpired) { showPaymentModal(); return; }
  currentCategory = cat;
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
  filterNews();
}

async function loadNews() {
  if (isExpired) { showExpiredWall(); return; }
  document.getElementById('contentArea').innerHTML =
    '<div class="loading"><div class="spinner"></div><p>Memuat & menerjemahkan berita...</p><small>Proses pertama membutuhkan sekitar 1-2 menit untuk terjemahan.</small></div>';

  try {
    const token = localStorage.getItem('token');
    const res = await fetch(`${API_URL}/api/news`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();

    if (!data.ok) { document.getElementById('contentArea').innerHTML = '<div class="empty">❌ Gagal memuat berita</div>'; return; }

    const seen = new Set();
    allNews = (data.news || []).filter(item => {
      if (seen.has(item.title)) return false;
      seen.add(item.title);
      return true;
    });

    filterNews();
  } catch (err) {
    document.getElementById('contentArea').innerHTML = `<div class="empty">❌ ${err.message}</div>`;
  }
}

function filterNews() {
  if (isExpired) { showExpiredWall(); return; }
  const search = document.getElementById('searchBox').value.toLowerCase();
  let filtered = allNews;
  if (currentCategory !== 'all') filtered = filtered.filter(n => n.category === currentCategory);
  if (search) filtered = filtered.filter(n =>
    n.title.toLowerCase().includes(search) || (n.description || '').toLowerCase().includes(search)
  );
  renderNews(filtered);
  document.getElementById('stats').textContent = `Total: ${allNews.length} berita | Ditampilkan: ${filtered.length}`;
}

function renderNews(news) {
  if (news.length === 0) {
    document.getElementById('contentArea').innerHTML = '<div class="empty">📭 Tidak ada berita ditemukan</div>';
    return;
  }

  const categoryEmoji = { finance: '💰', crypto: '₿', ai: '🤖', tech: '💻' };

  document.getElementById('contentArea').innerHTML = `<div class="news-list">${news.map(item => {
    const hasTranslation = item.title_id && item.title_id !== item.title;
    const emoji = categoryEmoji[item.category] || '📰';
    const date = new Date(item.pubDate).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

    return `
    <div class="news-item">
      <div class="news-header">
        <div class="news-badge">${emoji} ${item.category.toUpperCase()} &nbsp;·&nbsp; ${item.source}</div>
      </div>

      <!-- ENGLISH -->
      <div class="lang-section">
        <div class="lang-label"><span class="lang-flag">🇬🇧</span> English</div>
        <div class="news-title-en">${item.title}</div>
        ${item.description ? `<div class="news-desc-en">${item.description}</div>` : ''}
      </div>

      ${hasTranslation ? `
      <div class="lang-divider"></div>
      <!-- INDONESIA -->
      <div class="lang-section-id">
        <div class="lang-label"><span class="lang-flag">🇮🇩</span> Bahasa Indonesia</div>
        <div class="news-title-id">${item.title_id}</div>
        ${item.description_id ? `<div class="news-desc-id">${item.description_id}</div>` : ''}
      </div>` : ''}

      <div class="news-footer">
        <span>📅 ${date}</span>
        <a href="${item.link}" target="_blank" class="news-link">Baca selengkapnya →</a>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function refreshNews() { if (!isExpired) loadNews(); }

function showPaymentModal() { document.getElementById('paymentModal').classList.add('active'); }
function closePaymentModal() { document.getElementById('paymentModal').classList.remove('active'); }
function updatePrice() {
  const plan = document.querySelector('input[name="plan"]:checked').value;
  document.getElementById('totalPrice').textContent = plan === 'monthly' ? '49.000' : '399.000';
}

async function proceedPayment() {
  const token = localStorage.getItem('token');
  const plan = document.querySelector('input[name="plan"]:checked').value;
  try {
    const res = await fetch(`${API_URL}/api/payment/subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ plan }),
    });
    const data = await res.json();
    if (!data.ok) { alert('❌ ' + data.error); return; }
    snap.pay(data.snapToken, {
      onSuccess: () => { alert('✅ Payment berhasil! Terima kasih.'); closePaymentModal(); setTimeout(() => location.reload(), 1000); },
      onPending: () => alert('⏳ Payment pending. Cek email untuk instruksi.'),
      onError: () => alert('❌ Payment gagal. Coba lagi.'),
      onClose: () => {},
    });
  } catch (err) { alert('❌ ' + err.message); }
}

function goAdmin() { window.location.href = 'admin.html'; }
function logout() { localStorage.clear(); window.location.href = 'login.html'; }

init();
</script>
</body>
</html>
